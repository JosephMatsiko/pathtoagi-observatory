name: deploy

# Manual-only fallback deploy. The Command Center is the deployer of record
# (it re-gates and ships after every mesh cycle); running this on every push
# just produced red ✗s because the Netlify secrets are unset. Trigger by hand
# if the Command Center is ever unavailable — requires NETLIFY_AUTH_TOKEN and
# NETLIFY_SITE_ID secrets.

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Conformance gate
        run: npm run check:record
      - name: Build
        run: npm run build
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx --yes netlify-cli deploy --dir=dist --prod --message "deploy ${{ github.sha }}"
